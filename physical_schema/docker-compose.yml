services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.12.51:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:14b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-300}
      - NL_SQL_LLM_PROVIDER=${NL_SQL_LLM_PROVIDER:-ollama}
      - NL_SQL_USE_LLM=${NL_SQL_USE_LLM:-true}
      - NL_SQL_LOG_LEVEL=${NL_SQL_LOG_LEVEL:-INFO}
      - NL_SQL_API_KEY_HEADER=${NL_SQL_API_KEY_HEADER:-X-API-Key}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    volumes:
      - ./current:/app/current:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
