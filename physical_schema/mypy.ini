[mypy]
ignore_missing_imports = True
# The try/except import pattern for dual package/direct execution
# causes no-redef false positives. Disable for affected modules.

[mypy-tools.query_builder]
disable_error_code = no-redef

[mypy-tools.join_planner]
disable_error_code = no-redef

[mypy-tools.spec_executor]
disable_error_code = no-redef
